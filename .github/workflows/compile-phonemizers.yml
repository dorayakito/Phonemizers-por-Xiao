name: Compile OpenUtau Phonemizers

on:
  push:
    branches:
      - main
    paths:
      - '**.cs'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-net@v3
        with:
          dotnet-version: 6.0.x

      - name: Clone OpenUtau
        run: git clone https://github.com/stakira/OpenUtau.git openutau

      - name: Build OpenUtau Core and Api
        run: |
          dotnet build openutau/OpenUtau.Core/OpenUtau.Core.csproj -c Release
          dotnet build openutau/OpenUtau.Api/OpenUtau.Api.csproj -c Release

      - name: Build Plugins
        run: |
          mkdir -p "Phonemizers compilados"
          for file in *.cs; do
            name=$(basename "$file" .cs)
            echo "Building $name..."
            cat <<EOF > "$name.csproj"
            <Project Sdk="Microsoft.NET.Sdk">
              <PropertyGroup>
                <TargetFramework>netstandard2.1</TargetFramework>
                <AssemblyName>$name</AssemblyName>
                <EnableDefaultItems>false</EnableDefaultItems>
              </PropertyGroup>
              <ItemGroup>
                <Compile Include="$file" />
                <Reference Include="OpenUtau.Api">
                  <HintPath>openutau/OpenUtau.Api/bin/Release/netstandard2.1/OpenUtau.Api.dll</HintPath>
                </Reference>
                <Reference Include="OpenUtau.Core">
                  <HintPath>openutau/OpenUtau.Core/bin/Release/net6.0/OpenUtau.Core.dll</HintPath>
                </Reference>
              </ItemGroup>
            </Project>
            EOF
            dotnet build "$name.csproj" -c Release
            cp "bin/Release/netstandard2.1/$name.dll" "Phonemizers compilados/"
          done

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add "Phonemizers compilados/*.dll"
          # Deleta o arquivo antigo caso exista
          git rm -f "Phonemizers compilados/Phonemizers.dll" || true
          git commit -m "chore: auto-compile separate phonemizers to DLL" || exit 0
          git push
